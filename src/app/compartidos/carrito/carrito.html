<div class="cart-wrapper">

  <div class="cart-title">
    <i class="ti ti-shopping-cart" aria-hidden="true"></i>
    Carrito de compras
  </div>
  
  @if(productosCarrito.length > 0){<table class="table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Producto</th>
        <th scope="col">Cantidad</th>
        <th scope="col">Precio unit.</th>
        <th scope="col">Subtotal</th>
        <th scope="col"></th>
      </tr>
    </thead>
    <tbody>
      @for(p of productosCarrito; track p.id){
      <tr>
        <th scope="row"></th>
        <td>
          <div class="product-cell">
            <div class="product-icon">
              <i class="ti ti-ball-volleyball" aria-hidden="true"></i>
            </div>
            <div>
              <div class="product-name">{{p.nombre}}</div>
              <div class="product-cat">{{p.categoria}}</div>
            </div>
          </div>
        </td>
        <td>
          <div class="qty-control">
            <button class="qty-btn" (click)="disminuir(p.id)" aria-label="Reducir cantidad">−</button>
            <span class="qty-num">{{p.cantidad}}</span>
            <button class="qty-btn" (click)="aumentar(p.id)" aria-label="Aumentar cantidad">+</button>
          </div>
        </td>
        <td class="price-cell">${{p.precio}}</td>
        <td class="price-cell">$</td>
        <td>
          <button class="btn-remove" (click)="eliminar(p.id)" aria-label="Eliminar producto">
            Eliminar
          </button>
        </td>
      </tr>
      }
    </tbody>
  </table>

  <div class="cart-footer">
    <div>
      <div class="total-label">Total</div>
      <div class="total-price">$47.100</div>
    </div>
    <button class="btn-checkout">
      <i class="ti ti-credit-card" aria-hidden="true"></i>
      Finalizar compra
    </button>
  </div>
  }


</div>
